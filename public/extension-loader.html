<!DOCTYPE html>
<html>
  <head>
    <style>
      body { margin: 0; padding: 0; width: 400px; height: 600px; overflow: hidden; }
      iframe { width: 100%; height: 100%; border: none; }
    </style>
  </head>
  <body>
    <iframe src="http://localhost:3000/extension" allow="clipboard-read; clipboard-write"></iframe>

    <script>
      // THE BRIDGE: Listen for requests from the Next.js App (Iframe)
      window.addEventListener('message', (event) => {
        
        // 1. Receive Command from Localhost
        if (event.data.action === 'EXECUTE_SCAN') {
          // 2. Use Real Extension API (Only possible here)
          chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
            if (!tabs[0] || !tabs[0].id) return;
            
            // 3. Talk to the Web Page (Content Script)
            chrome.tabs.sendMessage(tabs[0].id, { action: "SCAN_PAGE_LINKS" }, (response) => {
              
              // 4. Send Result BACK to Localhost
              const iframe = document.querySelector('iframe');
              iframe.contentWindow.postMessage({ 
                action: 'SCAN_RESULT', 
                data: response,
                error: chrome.runtime.lastError ? chrome.runtime.lastError.message : null
              }, '*');
            });
          });
        }
      });
    </script>
  </body>
</html>
