<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body { 
        margin: 0; 
        padding: 0; 
        width: 400px; 
        height: 600px; 
        overflow: hidden;
        background: #09090b;
      }
      iframe { 
        width: 100%; 
        height: 100%; 
        border: none; 
      }
    </style>
  </head>
  <body>
    <iframe id="app-frame" src="http://localhost:3000/extension" title="Extension App" allow="clipboard-read; clipboard-write"></iframe>

    <script>
      const iframe = document.getElementById('app-frame');
      
      console.log('[Extension Loader] Popup opened, Chrome APIs available:', !!chrome.tabs);
      
      // Create a bridge to pass Chrome API calls from iframe to this context
      window.addEventListener('message', (event) => {
        // Only accept messages from our iframe
        if (event.source !== iframe.contentWindow) return;
        
        const { action, requestId, data } = event.data;
        console.log('[Extension Loader] Received message from iframe:', action, 'requestId:', requestId);
        
        if (action === 'QUERY_TABS') {
          console.log('[Extension Loader] Querying tabs with:', data.query);
          chrome.tabs.query(data.query, (tabs) => {
            console.log('[Extension Loader] Query result:', tabs.length, 'tabs found');
            iframe.contentWindow.postMessage({
              action: 'QUERY_TABS_RESPONSE',
              requestId,
              tabs,
              error: chrome.runtime.lastError?.message
            }, '*');
          });
        }
        
        if (action === 'SEND_MESSAGE') {
          console.log('[Extension Loader] Sending message to tab:', data.tabId, 'message:', data.message.action);
          chrome.tabs.sendMessage(data.tabId, data.message, (response) => {
            console.log('[Extension Loader] Message response received:', response);
            iframe.contentWindow.postMessage({
              action: 'SEND_MESSAGE_RESPONSE',
              requestId,
              response,
              error: chrome.runtime.lastError?.message
            }, '*');
          });
        }
        
        if (action === 'CHECK_CHROME_AVAILABLE') {
          iframe.contentWindow.postMessage({
            action: 'CHROME_AVAILABLE_RESPONSE',
            available: !!(chrome && chrome.tabs)
          }, '*');
        }
      });
      
      iframe.onload = function() {
        console.log('[Extension Loader] Iframe loaded, sending bridge ready signal');
        // Notify iframe that Chrome APIs are available via bridge
        setTimeout(() => {
          iframe.contentWindow.postMessage({
            action: 'CHROME_BRIDGE_READY',
            available: !!(chrome && chrome.tabs)
          }, '*');
          console.log('[Extension Loader] Bridge ready signal sent');
        }, 200);
      };
    </script>
  </body>
</html>
