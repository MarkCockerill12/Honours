<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Shield | AD-BLOCK SHIELD</title>
    <style>
      body {
        background-color: #09090b;
        color: #fafafa;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .container {
        max-width: 500px;
        padding: 40px;
        text-align: center;
        background: rgba(24, 24, 27, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(161, 161, 170, 0.1);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.8s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
        display: inline-block;
        filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
      }
      h1 {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.05em;
        margin: 0 0 12px 0;
        text-transform: uppercase;
        color: #3b82f6;
      }
      p {
        font-size: 16px;
        color: #d1d1d6;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      .reason {
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 24px;
        font-size: 14px;
        color: #93c5fd;
        word-break: break-all;
      }
      .buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      button {
        padding: 12px 24px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #3b82f6;
        color: #fff;
      }
      .btn-primary:hover {
        background: #2563eb;
        transform: scale(1.05);
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📄</div>
      <h1>PDF Shield Active</h1>
      <p>
        Chrome extensions cannot actively scan Native PDF documents for
        malicious content or trigger content filters. To maintain your safety,
        this PDF has been temporarily blocked from loading.
      </p>
      <div id="reason-box" class="reason">
        Attempted to load: <br /><strong id="detected-url">Unknown</strong>
      </div>
      <div class="buttons">
        <button class="btn-primary" id="proceed-anyway">Load PDF Anyway</button>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(globalThis.location.search);
      const url = params.get("url");

      if (url) {
        globalThis.document.getElementById("detected-url").textContent = url;

        globalThis.document.getElementById("proceed-anyway").onclick = () => {
          // Notify background to allow this specific PDF URL for this session
          if (typeof chrome !== "undefined" && chrome.runtime) {
            chrome.runtime.sendMessage(
              { action: "ALLOW_PDF", url },
              (response) => {
                // Redirect back to the original PDF URL
                globalThis.location.href = url;
              },
            );
          } else {
            // Fallback for dev/preview
            globalThis.location.href = url;
          }
        };
      }
    </script>
  </body>
</html>
