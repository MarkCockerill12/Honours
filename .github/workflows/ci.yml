# CI Workflow - Unit Tests
# NOTE: This workflow is INACTIVE by default.
# To activate, uncomment the 'on:' trigger below and remove the current 'on: workflow_dispatch'.

name: CI - Unit Tests

# INACTIVE: Only runs when manually triggered
on: workflow_dispatch

# ACTIVATE by replacing the above with:
# on:
#   push:
#     branches: [main, develop]
#   pull_request:
#     branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun vitest run --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 30
