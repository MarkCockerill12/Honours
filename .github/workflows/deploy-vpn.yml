# CD Workflow - Deploy VPN Updates to AWS EC2
# NOTE: This workflow is INACTIVE by default.
# To activate, uncomment the 'on:' trigger below and remove the current 'on: workflow_dispatch'.
# You must also configure the following GitHub Secrets:
#   - EC2_HOST: Your EC2 instance public IP or hostname
#   - EC2_USER: SSH username (e.g., 'ubuntu' or 'ec2-user')
#   - EC2_SSH_KEY: Private SSH key for EC2 access

name: CD - Deploy VPN to EC2

# INACTIVE: Only runs when manually triggered
on: workflow_dispatch

# ACTIVATE by replacing the above with:
# on:
#   push:
#     branches: [main]
#     paths:
#       - 'apps/backend/**'
#       - 'packages/core/src/vpn.ts'

jobs:
  deploy-vpn:
    name: Deploy VPN Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run VPN-related tests
        run: npx vitest run packages/core/src/vpn.test.ts --reporter=verbose

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Deploying VPN updates ==="
            cd /opt/honours-vpn

            # Pull latest VPN-related files
            git pull origin main

            # Install/update dependencies
            npm ci --production

            # Restart VPN backend service
            sudo systemctl restart honours-vpn-backend

            # Restart WireGuard if config changed
            sudo systemctl restart wg-quick@wg0 || true

            # Verify services are running
            echo "--- Service Status ---"
            sudo systemctl status honours-vpn-backend --no-pager
            sudo systemctl status wg-quick@wg0 --no-pager || true

            echo "=== Deployment complete ==="
